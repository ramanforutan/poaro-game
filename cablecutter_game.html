<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { background:#0a0a12; font-family:'Vazirmatn',Tahoma,sans-serif; overflow:hidden; height:100dvh; }
#gameCanvas { display:block; width:100vw; height:100dvh; touch-action:none; }
#ui { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:14px 18px 0; pointer-events:none; z-index:10; }
#scoreBox { font-size:2.2rem; font-weight:900; color:#ffe44d; text-shadow:0 0 22px #ffe44d99; }

.lv.dead { background:#2a2a2a; box-shadow:none; transform:scale(.8); }
#timerBar { position:fixed; top:56px; left:18px; right:18px; height:8px; background:#1a1a28; border-radius:4px; z-index:10; overflow:hidden; }
#timerFill { height:100%; width:100%; background:linear-gradient(90deg,#ff4444,#ffe44d,#88ff88); border-radius:4px; transition:width .1s linear; }
#overlay,#home,#lb { position:fixed; inset:0; background:#0a0a12; display:none; flex-direction:column; align-items:center; justify-content:center; gap:13px; z-index:30; }
#home.show,#overlay.show,#lb.show { display:flex; }
#overlay { background:#0a0a12f2; }
.ovr-title { font-size:2.4rem; font-weight:900; color:#ff4444; letter-spacing:2px; }
.ovr-score { font-size:.9rem; color:#666; } .ovr-score b { color:#ffe44d; font-size:1.5rem; }
.ovr-best { font-size:.8rem; color:#555; } .ovr-best span { color:#88ff88; font-weight:700; }
.home-title { font-size:2.1rem; font-weight:900; color:#ffe44d; letter-spacing:3px; }
.home-sub { font-size:.72rem; color:#555; letter-spacing:5px; margin-bottom:18px; }
.home-desc { font-size:.82rem; color:#666; text-align:center; max-width:250px; line-height:1.8; margin-bottom:24px; }
.btn { background:linear-gradient(135deg,#d4a000,#ffe44d); color:#111; font-weight:900; font-size:1.05rem; border:none; border-radius:14px; padding:15px 46px; cursor:pointer; }
.btn2 { background:#1a1a28; color:#aaa; font-size:.85rem; border:1px solid #333; border-radius:10px; padding:11px 30px; cursor:pointer; margin-top:8px; }
.lb-hdr { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #1a1a28; gap:10px; }
.lb-hdr h2 { flex:1; font-size:1rem; font-weight:900; color:#e8e8f0; }
.lb-back { background:none; border:1px solid #333; color:#aaa; border-radius:8px; padding:6px 14px; font-size:.8rem; cursor:pointer; }
.lb-tabs { position:absolute; top:53px; left:0; right:0; display:flex; border-bottom:1px solid #1a1a28; }
.lb-tab { flex:1; padding:11px; text-align:center; font-size:.82rem; font-weight:700; color:#555; cursor:pointer; border-bottom:2px solid transparent; }
.lb-tab.on { color:#ffe44d; border-color:#ffe44d; }
.lb-list { position:absolute; top:100px; left:0; right:0; bottom:0; overflow-y:auto; }
.lb-row { display:flex; align-items:center; padding:11px 16px; border-bottom:1px solid #ffffff07; gap:11px; }
.lb-row.me { background:#ffe44d12; }
.lb-rank { font-size:.95rem; font-weight:900; min-width:26px; text-align:center; color:#555; }
.lb-rank.g{color:#ffe44d;} .lb-rank.s{color:#bbb;} .lb-rank.b{color:#cd7f32;}
.lb-av { width:36px; height:36px; border-radius:50%; background:#1a1a28; border:1px solid #333; display:flex; align-items:center; justify-content:center; color:#888; flex-shrink:0; }
.lb-nm { flex:1; font-size:.88rem; font-weight:700; color:#ccc; }
.lb-sc { font-size:.95rem; font-weight:900; color:#ffe44d; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="scoreBox">0</div>
  <div id="bestBox">بهترین<span id="bestVal">0</span></div>
  <div id="livesBox"></div>
</div>
<div id="timerBar"><div id="timerFill"></div></div>

<div id="home" class="show">
  <canvas id="prevCvs" width="130" height="150" style="margin-bottom:6px"></canvas>
  <div class="home-title">⚡ کابل‌بُر</div>
  <div class="home-sub">CABLE CUTTER</div>
  <div class="home-desc">چپ یا راست بزن تا کابل رو قطع کنی<br>اون طرفی که جرقه داره نرو!<br>سریع باش، نوار وقت تموم نشه</div>
  <button class="btn" onclick="startGame()">▶  شروع بازی</button>

  <div class="lb-hdr"><button class="lb-back" onclick="goHome()">← برگشت</button><h2>🏆 تابلوی امتیازات</h2></div>
  <div class="lb-tabs"><div class="lb-tab on" style="cursor:default">🏆 برترین‌های این هفته</div></div>
  <div class="lb-list" id="lbList"></div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor&&tg.setHeaderColor('#0a0a12'); }
const MY_ID=tg?.initDataUnsafe?.user?.id??0;
const MY_NAME=tg?.initDataUnsafe?.user?.first_name??'بازیکن';

let lbData={weekly:[]};
async function loadLB(){try{let r=await window.storage?.get('lb_w',true);if(r?.value)lbData.weekly=JSON.parse(r.value);}catch(e){}}
async function saveLB(sc){const e={id:MY_ID,name:MY_NAME,score:sc,ts:Date.now()};let arr=lbData.weekly;const i=arr.findIndex(x=>x.id===MY_ID);if(i>=0){if(sc>arr[i].score)arr[i]=e;}else arr.push(e);arr.sort((a,b)=>b.score-a.score);arr=arr.filter(x=>Date.now()-x.ts<7*864e5);lbData.weekly=arr.slice(0,100);try{await window.storage?.set('lb_w',JSON.stringify(lbData.weekly),true);}catch(e){}}
function loadBest(){return parseInt(localStorage.getItem('cb_best')||'0');}
function saveBest(v){localStorage.setItem('cb_best',v);}

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W,H,raf,running=false;
let score,best,lives,frame;
let charSide;        // 'L' | 'R'
let segments=[];     // pieces of cable from bottom up: {branch:'L'|'R'|null}
let particles=[];
let chopAnim=0;      // 0..1 swing animation progress
let timer,timerMax;
let shake=0;
let cableShift=0;    // smooth animation when a piece is cut
let fallOffset=0;    // how far cable has auto-fallen (0..SEG_H), when full -> force cut
let fallSpeed=0;     // current auto-fall speed (grows with score)
let burnFx=0;        // red burn flash when hit by spark (0..1)
let burningBranches=[]; // شاخه‌های در حال سوختن: {x,y,dir,life}

const SEG_H=58;      // height of one cable piece
const N_VISIBLE=9;   // how many pieces shown stacked

function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  canvas.width=w*devicePixelRatio; canvas.height=h*devicePixelRatio;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(devicePixelRatio,devicePixelRatio);
  W=w; H=h;
}
window.addEventListener('resize',resize);

// cable bottom sits at groundY; pieces stack upward
function groundY(){ return H*0.74; }
function cableX(){ return W*0.5; }
function charBaseX(){ return charSide==='L'? W*0.5-46 : W*0.5+46; }

// generate a new top piece, ensuring solvable (never trap player)
function genPiece(prevBranch){
  // قانون: بعد از هر شاخه، حتماً یه بلوک خالی بیاد (گپ برای فرار)
  if(prevBranch){
    return {branch:null};  // بلوک قبلی شاخه داشت → این یکی خالیه
  }
  // بلوک قبلی خالی بود → این یکی می‌تونه شاخه داشته باشه
  const r=Math.random();
  if(r<0.40) return {branch:null};   // ۴۰٪ بازم خالی
  return {branch: Math.random()<.5?'L':'R'};
}

function initSegments(){
  segments=[];
  // first few pieces always safe (no branch) so player can start
  for(let i=0;i<N_VISIBLE+2;i++){
    if(i<2) segments.push({branch:null});
    else segments.push(genPiece(segments[i-1].branch));
  }
}

// INPUT: tap a side => chop + move there
function tap(side){
  if(!running) return;
  charSide=side;
  chopAnim=1;  // trigger swing

  // the bottom piece is segments[0]; its branch must NOT be on the side we moved to
  const bottom=segments[0];
  if(bottom.branch===side){
    // شاخه به سر آدمک خورد → اول می‌سوزه، بعد حذف میشه، جون کم میشه
    const dir = side==='L'?-1:1;
    const bx = cableX()+dir*(58/2+30);
    const by = groundY()-SEG_H*1.0;   // ارتفاع سر آدمک (بالاتر)
    burningBranches.push({x:bx, y:by, dir, life:1});
    addParticles(bx, by, '#ff4444', 18);
    addParticles(bx, by, '#ff8800', 12);
    burnFx=1;
    shake=14;
    loseLife();
    if(!running) return;
    // شاخه سوخته حذف شد — بلوک رد میشه
    bottom.branch=null;
    segments.shift();
    segments.push(genPiece(segments[segments.length-1].branch));
    cableShift=SEG_H;
    fallOffset=0;
    return;
  }

  // successful chop
  score++;
  addParticles(cableX(), groundY()-SEG_H*0.4,'#ffe44d',12);
  if(bottom.branch){ // cut the branch off -> sparks fly
    addParticles(cableX()+(bottom.branch==='L'?-55:55), groundY()-SEG_H*0.5,'#00eeff',16);
  }
  // remove bottom piece, shift everything down (animate)
  segments.shift();
  segments.push(genPiece(segments[segments.length-1].branch));
  cableShift=SEG_H; // animate from +SEG_H to 0

  // هر ضربه fallOffset رو ریست می‌کنه (یه نفس می‌گیری)
  fallOffset=0;

  document.getElementById('scoreBox').textContent=score;
  if(score>best){ best=score; saveBest(best); document.getElementById('bestVal').textContent=best; }
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();tap(e.touches[0].clientX<W/2?'L':'R');},{passive:false});
canvas.addEventListener('mousedown',e=>tap(e.clientX<W/2?'L':'R'));
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')tap('L');if(e.key==='ArrowRight'||e.key==='d')tap('R');});

let lives_;
function loseLife(){ lives--; renderLives(); if(lives<=0) setTimeout(gameOver,100); }
function renderLives(){const el=document.getElementById('livesBox');el.innerHTML='';for(let i=0;i<3;i++){const d=document.createElement('div');d.className='lv'+(i>=lives?' dead':'');el.appendChild(d);}}

function addParticles(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:.03+Math.random()*.04,c,sz:2+Math.random()*4});}}

// ───── DRAW ──────────────────────────────────────────────
function drawBG(){
  ctx.fillStyle='#07070f'; ctx.fillRect(0,0,W,H);
  // top sky glow
  let g=ctx.createLinearGradient(0,0,0,H*.3);
  g.addColorStop(0,'#100a26'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*.3);

  // ── GROUND (واضح) ──
  const gy=groundY()+SEG_H*0.3;
  // soil gradient
  let dg=ctx.createLinearGradient(0,gy,0,H);
  dg.addColorStop(0,'#3a2410'); dg.addColorStop(0.15,'#241608'); dg.addColorStop(1,'#0d0800');
  ctx.fillStyle=dg; ctx.fillRect(0,gy,W,H-gy);
  // grass / top edge highlight
  ctx.fillStyle='#4a7020';
  ctx.fillRect(0,gy-4,W,5);
  ctx.fillStyle='#5d8a28';
  ctx.fillRect(0,gy-4,W,2);
  // surface line
  ctx.strokeStyle='#1a1000'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,gy+1); ctx.lineTo(W,gy+1); ctx.stroke();
  // dirt rocks/specks (ثابت)
  ctx.fillStyle='#1a1005';
  for(let i=0;i<28;i++){
    const px=(i*131)%W;
    const py=gy+10+((i*71)%(H-gy-10));
    const sz=2+(i%3);
    ctx.fillRect(px,py,sz,sz);
  }
  // lighter pebbles
  ctx.fillStyle='#4a3015';
  for(let i=0;i<10;i++){
    const px=(i*197+40)%W;
    const py=gy+18+((i*113)%(H-gy-18));
    ctx.beginPath(); ctx.arc(px,py,2.5,0,Math.PI*2); ctx.fill();
  }
  // ── تقسیم واضح چپ/راست (گرید عمودی) ──
  // ناحیه چپ
  let lg=ctx.createLinearGradient(0,0,W*0.5,0);
  lg.addColorStop(0,'#0a1420'); lg.addColorStop(1,'transparent');
  ctx.fillStyle=lg; ctx.fillRect(0,0,W*0.5,gy);
  // ناحیه راست
  let rg=ctx.createLinearGradient(W,0,W*0.5,0);
  rg.addColorStop(0,'#1a0f08'); rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.fillRect(W*0.5,0,W*0.5,gy);
  // خط وسط (محور کابل)
  ctx.strokeStyle='#ffffff0a'; ctx.lineWidth=1; ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(W*0.5,0); ctx.lineTo(W*0.5,gy); ctx.stroke();
  ctx.setLineDash([]);
  // گرید افقی کم‌رنگ
  ctx.strokeStyle='#ffffff07'; ctx.lineWidth=1;
  for(let y=0;y<gy;y+=SEG_H){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawCable(){
  const cx=cableX();
  // shift = آنیمیشن قطع شدن + سقوط خودکار (هر دو کابل رو پایین می‌برن)
  const shift=cableShift+fallOffset;
  // glow behind cable
  ctx.save();
  ctx.shadowBlur=16; ctx.shadowColor='#00eeff30';
  ctx.strokeStyle='#00eeff14'; ctx.lineWidth=30;
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,groundY()); ctx.stroke();
  ctx.restore();

  // each piece, from bottom (i=0) upward
  for(let i=0;i<N_VISIBLE;i++){
    const seg=segments[i];
    const yTop = groundY() - (i+1)*SEG_H + shift;
    const yBot = groundY() - i*SEG_H + shift;
    drawCablePiece(cx, yTop, yBot, seg, i);
  }
}

function drawCablePiece(cx, yTop, yBot, seg, i){
  const w=58;            // عرض بلوک (پهن‌تر = مربعی‌تر چون SEG_H هم ۵۸ هست)
  const x=cx-w/2;
  const gap=4;           // فاصله بین بلوک‌ها (گرید واضح)
  const by=yTop+gap/2;
  const bh=(yBot-yTop)-gap;

  // ── بلوک کابل (مربع واضح با بُردر و گپ) ──
  // بدنه فلزی
  ctx.fillStyle = i%2===0 ? '#2a2a42' : '#252539';
  ctx.fillRect(x, by, w, bh);
  // گرادیان عمودی (نور از چپ)
  let g=ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#44446a'); g.addColorStop(0.25,'#33334e'); g.addColorStop(0.55,'#22223a'); g.addColorStop(1,'#16162c');
  ctx.fillStyle=g; ctx.fillRect(x,by,w,bh);
  // هایلایت سمت چپ (لبه نور)
  ctx.fillStyle='#5a5a82'; ctx.fillRect(x+3,by+2,5,bh-4);
  // سایه سمت راست
  ctx.fillStyle='#0e0e1e'; ctx.fillRect(x+w-5,by+2,4,bh-4);
  // دو خط افقی (بافت کابل)
  ctx.strokeStyle='#0e0e1c'; ctx.lineWidth=1;
  const m=(by+by+bh)/2;
  ctx.beginPath(); ctx.moveTo(x+7,m-5); ctx.lineTo(x+w-7,m-5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+7,m+5); ctx.lineTo(x+w-7,m+5); ctx.stroke();
  // ── بُردر دوتایی واضح (مشکی بیرون + روشن داخل) ──
  ctx.strokeStyle='#000'; ctx.lineWidth=3;
  ctx.strokeRect(x, by, w, bh);
  ctx.strokeStyle='#6a6a96'; ctx.lineWidth=1.5;
  ctx.strokeRect(x+2, by+2, w-4, bh-4);

  // ── شاخه جرقه (واضح، از کنار بلوک) ──
  if(seg.branch){
    const dir=seg.branch==='L'?-1:1;
    const my=m;
    const t=frame*0.15+i;
    // پایه فلزی شاخه که به بلوک چسبیده
    ctx.fillStyle='#4a4a60';
    ctx.fillRect(dir<0 ? x-15 : x+w, my-10, 15, 20);
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.strokeRect(dir<0 ? x-15 : x+w, my-10, 15, 20);
    // سیم لخت بیرون‌زده
    const wireEnd=cx+dir*(w/2+52);
    ctx.strokeStyle='#667'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(cx+dir*(w/2+12),my); ctx.lineTo(wireEnd,my); ctx.stroke();
    ctx.strokeStyle='#99a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx+dir*(w/2+12),my); ctx.lineTo(wireEnd,my); ctx.stroke();
    // توپ جرقه پر سر و صدا انتهای سیم
    drawSparks(wireEnd, my, t);
    // قوس برق کوچک بین سیم و بلوک
    ctx.save();
    ctx.strokeStyle='#9ff'; ctx.lineWidth=1.5; ctx.globalAlpha=0.4+Math.sin(t*3)*0.3;
    ctx.shadowBlur=6; ctx.shadowColor='#0ef';
    let zx=cx+dir*(w/2+10), zy=my;
    ctx.beginPath(); ctx.moveTo(zx,zy);
    for(let k=0;k<3;k++){ zx+=dir*12; zy+=(Math.random()-.5)*10; ctx.lineTo(zx,zy); }
    ctx.stroke();
    ctx.restore();
  }
}

function drawSparks(x,y,t){
  ctx.save();
  const cols=['#ffe44d','#00eeff','#ff8800','#fff'];
  // هاله مرکزی پررنگ
  let g=ctx.createRadialGradient(x,y,0,x,y,22);
  g.addColorStop(0,'#fff8'); g.addColorStop(.3,'#ffe44d66'); g.addColorStop(.6,'#00eeff33'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill();
  // جرقه‌های دور
  for(let i=0;i<7;i++){
    const a=i/7*Math.PI*2+t+i*0.5;
    const r=8+Math.sin(t*1.6+i)*7;
    const sx=x+Math.cos(a)*r, sy=y+Math.sin(a)*r*.7;
    const c=cols[i%4];
    ctx.globalAlpha=.5+Math.sin(t*2.5+i)*.5;
    ctx.fillStyle=c; ctx.shadowBlur=10; ctx.shadowColor=c;
    ctx.beginPath(); ctx.arc(sx,sy,2.2+Math.sin(t+i)*1.3,0,Math.PI*2); ctx.fill();
  }
  // رشته‌های برق کوتاه
  ctx.globalAlpha=0.7; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.shadowBlur=8; ctx.shadowColor='#0ef';
  for(let i=0;i<3;i++){
    const a=t*2+i*2.1;
    ctx.beginPath(); ctx.moveTo(x,y);
    let zx=x,zy=y;
    for(let k=0;k<3;k++){ zx+=Math.cos(a)*7+(Math.random()-.5)*6; zy+=Math.sin(a)*7+(Math.random()-.5)*6; ctx.lineTo(zx,zy); }
    ctx.stroke();
  }
  ctx.restore();
}

// ───── CHARACTER with clear chop animation ──────────────
function drawChar(){
  const x=charBaseX();
  const y=groundY()+SEG_H*0.15;
  // chopAnim: 1 -> just hit (axe down), decays to 0 (axe raised)
  const swing = chopAnim; // 1 = axe striking, 0 = raised ready
  const bob=Math.sin(frame*0.12)*1.5;
  const flip = charSide==='R' ? -1 : 1; // face the cable
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(flip,1);

  // ── AXE (drawn first, behind body when raised) ──
  // arm pivot at shoulder
  const shX=14, shY=-26+bob;
  // when swing=0 axe is RAISED (up high), swing=1 axe is DOWN hitting cable
  const raisedAngle=-2.0;  // up
  const hitAngle=0.15;     // افقی به سمت کابل
  const armAngle = raisedAngle + (hitAngle-raisedAngle)*swing;

  ctx.save();
  ctx.translate(shX,shY);
  ctx.rotate(armAngle);
  // upper arm
  ctx.strokeStyle='#c8a882'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(16,2); ctx.stroke();
  // axe handle
  ctx.strokeStyle='#7a4e2c'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(16,2); ctx.lineTo(40,2); ctx.stroke();
  // axe head
  ctx.fillStyle='#aab8c8';
  ctx.beginPath();
  ctx.moveTo(40,-8); ctx.lineTo(52,-10); ctx.lineTo(54,4); ctx.lineTo(40,10); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='#ccdaea'; ctx.lineWidth=1.5; ctx.stroke();
  // blade glow on hit
  if(swing>0.6){
    ctx.strokeStyle='#00eeff'; ctx.lineWidth=2; ctx.shadowBlur=10; ctx.shadowColor='#00eeff';
    ctx.beginPath(); ctx.moveTo(52,-10); ctx.lineTo(54,4); ctx.stroke();
  }
  ctx.restore();

  // ── BODY ──
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath(); ctx.roundRect(-13,-20+bob,26,36,5); ctx.fill();
  ctx.fillStyle='#252540';
  ctx.beginPath(); ctx.moveTo(-8,-20+bob); ctx.lineTo(0,-12+bob); ctx.lineTo(8,-20+bob); ctx.closePath(); ctx.fill();

  // head
  ctx.fillStyle='#c8a882';
  ctx.beginPath(); ctx.ellipse(0,-32+bob,13,14,0,0,Math.PI*2); ctx.fill();
  // hat
  ctx.fillStyle='#111'; ctx.fillRect(-16,-48+bob,32,6); ctx.fillRect(-10,-64+bob,20,18);
  ctx.fillStyle='#ffe44d'; ctx.fillRect(-10,-49+bob,20,3);
  // eyes
  ctx.fillStyle='#1a0a00';
  ctx.beginPath(); ctx.ellipse(-5,-33+bob,2.2,2.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5,-33+bob,2.2,2.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff9';
  ctx.beginPath(); ctx.ellipse(-4,-34+bob,1,1,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,-34+bob,1,1,0,0,Math.PI*2); ctx.fill();
  // MUSTACHE
  ctx.strokeStyle='#3a1800'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-27+bob); ctx.bezierCurveTo(-2,-27+bob,-8,-30+bob,-11,-26+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-27+bob); ctx.bezierCurveTo(2,-27+bob,8,-30+bob,11,-26+bob); ctx.stroke();
  ctx.fillStyle='#3a1800'; ctx.beginPath(); ctx.arc(0,-26.5+bob,1.6,0,Math.PI*2); ctx.fill();
  // idle arm
  ctx.strokeStyle='#c8a882'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-13,-14+bob); ctx.lineTo(-20,0+bob); ctx.stroke();
  // legs
  ctx.fillStyle='#111'; ctx.fillRect(-10,14+bob,8,17); ctx.fillRect(2,14+bob,8,17);
  ctx.fillStyle='#4a3000';
  ctx.beginPath(); ctx.roundRect(-12,28+bob,12,8,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1,28+bob,12,8,3); ctx.fill();

  ctx.restore();
}

function drawBurningBranches(){
  burningBranches=burningBranches.filter(b=>{
    b.life-=0.04;
    if(b.life<=0) return false;
    ctx.save();
    // شاخه‌ای که داره می‌سوزه — نارنجی/قرمز که محو میشه
    ctx.globalAlpha=b.life;
    // هاله آتش
    let g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,28*b.life+8);
    g.addColorStop(0,'#fff'); g.addColorStop(.3,'#ffaa00'); g.addColorStop(.6,'#ff4400'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.shadowBlur=20; ctx.shadowColor='#ff6600';
    ctx.beginPath(); ctx.arc(b.x,b.y,28*b.life+8,0,Math.PI*2); ctx.fill();
    // دود بالارونده
    ctx.globalAlpha=b.life*0.4;
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.arc(b.x+b.dir*3, b.y-25*(1-b.life), 8*(1-b.life)+3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return true;
  });
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.13; p.life-=p.decay;
    if(p.life<=0) return false;
    ctx.save(); ctx.globalAlpha=p.life; ctx.shadowBlur=6; ctx.shadowColor=p.c; ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
    return true;
  });
}

// lightning periodic
let ltTimer=90, ltA=0;
function lightning(){
  ltTimer--;
  if(ltTimer<=0){ ltTimer=100+Math.random()*140; ltA=1; }
  if(ltA>0){
    ctx.save(); ctx.globalAlpha=ltA*.6; ctx.strokeStyle='#ffe44d'; ctx.lineWidth=2;
    ctx.shadowBlur=14; ctx.shadowColor='#ffe44d';
    let lx=cableX()+(-1+Math.random()*2)*40, ly=0;
    ctx.beginPath(); ctx.moveTo(lx,ly);
    while(ly<H*.35){ lx+=(Math.random()-.5)*44; ly+=18+Math.random()*22; ctx.lineTo(lx,ly); }
    ctx.stroke(); ctx.restore();
    ltA-=.09;
  }
}

function drawHint(){
  ctx.save();
  // ناحیه فعال (سمتی که شخصیت ایستاده) کمی روشن‌تر
  ctx.globalAlpha=.04;
  if(charSide==='L'){ ctx.fillStyle='#00eeff'; ctx.fillRect(0,0,W*.5,groundY()); }
  else { ctx.fillStyle='#ff8800'; ctx.fillRect(W*.5,0,W*.5,groundY()); }
  // فلش‌های راهنما پایین
  ctx.globalAlpha=.12; ctx.fillStyle='#fff'; ctx.font='bold 30px Arial'; ctx.textAlign='center';
  ctx.fillText('◀',W*.25,H*.96); ctx.fillText('▶',W*.75,H*.96);
  ctx.restore();
}

function loop(){
  if(!running) return;
  raf=requestAnimationFrame(loop);
  frame++;

  // ── سقوط خودکار کابل (هی سریع‌تر) ──
  // سرعت پله‌ای بر اساس امتیاز
  // ۰→۲۰→۵۰→۷۵→۱۰۰→۱۲۵→ هر ۲۵ امتیاز یه پله تا ۱۰۰۰۰
  function stepSpeed(){
    let lvl=0;
    if(score>=20) lvl=1;
    if(score>=50) lvl=2;
    if(score>=75) lvl=2+Math.floor((score-50)/25);
    return Math.min(SEG_H*0.12, 0.38+lvl*0.15);
  }
  fallOffset += stepSpeed();
  if(fallOffset >= SEG_H){
    fallOffset = 0;
    segments.shift();
    segments.push(genPiece(segments[segments.length-1].branch));

    // چک برخورد روی بلوک الان (که الان شده segments[0])
    // یعنی وقتی شاخه رسیده کمر/سینه آدمک — نه پاش
    const danger = segments[0];
    if(danger.branch === charSide){
      const dir = charSide==='L'?-1:1;
      const bx = cableX() + dir*(58/2+30);
      const by = groundY()-SEG_H*1.0;
      burningBranches.push({x:bx, y:by, dir, life:1});
      addParticles(bx, by, '#ff4444', 20);
      addParticles(bx, by, '#ff8800', 14);
      burnFx = 1;
      shake = 16;
      danger.branch = null;
      loseLife();
      if(!running) return;
    }
  }
  // نوار بالا = چقدر تا سقوط مونده
  const left = 1 - (fallOffset / SEG_H);
  document.getElementById('timerFill').style.width = (left*100)+'%';

  // decay animations
  if(chopAnim>0) chopAnim=Math.max(0,chopAnim-0.12);
  if(cableShift>0) cableShift=Math.max(0,cableShift-SEG_H*0.35);
  if(burnFx>0) burnFx=Math.max(0,burnFx-0.05);

  const sh = shake>0 ? shake : 0;
  ctx.save();
  if(sh>0){ ctx.translate((Math.random()-.5)*sh,(Math.random()-.5)*sh); shake*=.8; if(shake<.5)shake=0; }

  drawBG();
  lightning();
  drawCable();
  drawBurningBranches();
  drawHint();
  drawChar();
  updateParticles();
  ctx.restore();

  // فلش قرمز سوختن روی کل صفحه
  if(burnFx>0){
    ctx.save();
    ctx.globalAlpha=burnFx*0.4;
    ctx.fillStyle='#ff2200';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function startGame(){
  ['home','overlay','lb'].forEach(id=>document.getElementById(id).classList.remove('show'));
  cancelAnimationFrame(raf);
  resize();
  score=0; lives=3; frame=0; charSide='L'; particles=[]; chopAnim=0; cableShift=0; shake=0;
  fallOffset=0; burnFx=0; burningBranches=[];
  timerMax=100; timer=100;
  best=loadBest();
  document.getElementById('scoreBox').textContent='0';
  document.getElementById('bestVal').textContent=best;
  renderLives();
  initSegments();
  running=true; loop();
}
async function gameOver(){
  if(!running) return;
  running=false; cancelAnimationFrame(raf);
  await saveLB(score);
  document.getElementById('goSc').textContent=score;
  document.getElementById('goBst').textContent=best;
  document.getElementById('overlay').classList.add('show');
}
function goHome(){ running=false; cancelAnimationFrame(raf); ['overlay','lb'].forEach(id=>document.getElementById(id).classList.remove('show')); document.getElementById('home').classList.add('show'); }

function showLB(){ ['home','overlay'].forEach(id=>document.getElementById(id).classList.remove('show')); running=false; cancelAnimationFrame(raf); loadLB().then(renderLBList); document.getElementById('lb').classList.add('show'); }
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function renderLBList(){
  const data=lbData.weekly||[]; const el=document.getElementById('lbList');
  if(!data.length){ el.innerHTML='<div style="padding:40px;text-align:center;color:#444">هنوز امتیازی ثبت نشده 🎮<br><br>اولین نفر باش!</div>'; return; }
  const m=['🥇','🥈','🥉'],rc=['g','s','b'];
  el.innerHTML=data.map((e,i)=>`<div class="lb-row ${e.id===MY_ID?'me':''}"><div class="lb-rank ${rc[i]||''}">${i<3?m[i]:i+1}</div><div class="lb-av">${esc(e.name)[0]||'?'}</div><div class="lb-nm">${esc(e.name)}</div><div class="lb-sc">${e.score.toLocaleString('fa')}</div></div>`).join('');
}

// preview char on home
const pc=document.getElementById('prevCvs'), px=pc.getContext('2d'); let pf=0;

  const x=65,y=105,bob=Math.sin(pf*.13)*2;
  const sw=(Math.sin(pf*.08)+1)/2; // 0..1 chop demo
  px.save(); px.translate(x,y);
  // axe
  px.save(); px.translate(14,-26+bob); px.rotate(-2.2+2.7*sw);
  px.strokeStyle='#c8a882'; px.lineWidth=6; px.lineCap='round';
  px.beginPath(); px.moveTo(0,0); px.lineTo(16,2); px.stroke();
  px.strokeStyle='#7a4e2c'; px.lineWidth=4; px.beginPath(); px.moveTo(16,2); px.lineTo(38,2); px.stroke();
  px.fillStyle='#aab8c8'; px.beginPath(); px.moveTo(38,-8); px.lineTo(50,-10); px.lineTo(52,4); px.lineTo(38,10); px.closePath(); px.fill();
  px.restore();
  px.fillStyle='#1a1a2e'; px.beginPath(); px.roundRect(-13,-20+bob,26,36,5); px.fill();
  px.fillStyle='#c8a882'; px.beginPath(); px.ellipse(0,-32+bob,13,14,0,0,Math.PI*2); px.fill();
  px.fillStyle='#111'; px.fillRect(-16,-48+bob,32,6); px.fillRect(-10,-64+bob,20,18);
  px.fillStyle='#ffe44d'; px.fillRect(-10,-49+bob,20,3);
  px.fillStyle='#1a0a00'; px.beginPath(); px.ellipse(-5,-33+bob,2.2,2.2,0,0,Math.PI*2); px.fill(); px.beginPath(); px.ellipse(5,-33+bob,2.2,2.2,0,0,Math.PI*2); px.fill();
  px.strokeStyle='#3a1800'; px.lineWidth=3; px.lineCap='round';
  px.beginPath(); px.moveTo(0,-27+bob); px.bezierCurveTo(-2,-27+bob,-8,-30+bob,-11,-26+bob); px.stroke();
  px.beginPath(); px.moveTo(0,-27+bob); px.bezierCurveTo(2,-27+bob,8,-30+bob,11,-26+bob); px.stroke();
  px.fillStyle='#111'; px.fillRect(-10,14+bob,8,17); px.fillRect(2,14+bob,8,17);
  px.fillStyle='#4a3000'; px.beginPath(); px.roundRect(-12,28+bob,12,8,3); px.fill(); px.beginPath(); px.roundRect(1,28+bob,12,8,3); px.fill();
  px.restore();
  pf++;
}
setInterval(prev,55);
